<h2>搜尋欄位置</h2>
<p class="subtitle">搜尋框要放在哪裡？</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>整合在 FilterBar 旁邊</h3>
      <p>搜尋框與分類按鈕同一列，右側或左側。節省空間，視覺統一。</p>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-body" style="padding:12px">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <div style="padding:6px 14px;background:#8b5cf6;border-radius:20px;color:#fff;font-size:13px">全部</div>
            <div style="padding:6px 14px;background:rgba(51,65,85,0.4);border-radius:20px;color:#94a3b8;font-size:13px">企業管理</div>
            <div style="padding:6px 14px;background:rgba(51,65,85,0.4);border-radius:20px;color:#94a3b8;font-size:13px">工程工具</div>
            <div style="padding:6px 14px;background:rgba(51,65,85,0.4);border-radius:20px;color:#94a3b8;font-size:13px">AI 與數據</div>
            <div style="flex:1"></div>
            <input class="mock-input" placeholder="🔍 搜尋專案..." style="width:200px;font-size:13px">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>獨立一行，在 FilterBar 上方</h3>
      <p>搜尋框佔整行寬度，更醒目，適合專案數量多的情況。</p>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-body" style="padding:12px">
          <input class="mock-input" placeholder="🔍 搜尋專案名稱、技術、描述..." style="width:100%;font-size:14px;margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <div style="padding:6px 14px;background:#8b5cf6;border-radius:20px;color:#fff;font-size:13px">全部</div>
            <div style="padding:6px 14px;background:rgba(51,65,85,0.4);border-radius:20px;color:#94a3b8;font-size:13px">企業管理</div>
            <div style="padding:6px 14px;background:rgba(51,65,85,0.4);border-radius:20px;color:#94a3b8;font-size:13px">工程工具</div>
            <div style="padding:6px 14px;background:rgba(51,65,85,0.4);border-radius:20px;color:#94a3b8;font-size:13px">AI 與數據</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>在 Hero 區底部</h3>
      <p>搜尋框放在標題區下方，像 Google 首頁風格，第一眼就能開始搜尋。</p>
      <div class="mockup" style="margin-top:12px">
        <div class="mockup-body" style="padding:12px;text-align:center">
          <div style="font-size:20px;font-style:italic;margin-bottom:6px">MiuMiu Dev Works</div>
          <div style="color:#94a3b8;font-size:12px;margin-bottom:12px">22 projects across 7 domains</div>
          <input class="mock-input" placeholder="🔍 搜尋專案..." style="width:60%;font-size:14px;margin:0 auto">
        </div>
      </div>
    </div>
  </div>
</div>
